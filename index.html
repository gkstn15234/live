<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Screen Share</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #0f0f0f; --card: #1a1a2e; --accent: #e94560; --blue: #0f3460; --text: #eee; --muted: #888; }
body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header { background: var(--card); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
.header h1 { font-size: 1.4rem; font-weight: 700; }
.header h1 span { color: var(--accent); }
.status { font-size: 0.8rem; color: var(--muted); display: flex; align-items: center; gap: 8px; }
.status .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
.status .dot.live { background: #2ecc71; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.container { max-width: 1200px; margin: 0 auto; padding: 24px; }

.room { display: none; }
.room.active { display: block; }

.video-area { position: relative; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; max-height: 75vh; margin-bottom: 16px; }
.video-area video { width: 100%; height: 100%; object-fit: contain; }
.video-area .no-stream { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: var(--muted); font-size: 1.1rem; }
.video-area .rec-badge { position: absolute; top: 16px; left: 16px; background: #c0392b; color: #fff; font-size: 0.7rem; font-weight: 700; padding: 4px 10px; border-radius: 4px; display: none; animation: pulse 1.5s infinite; letter-spacing: 1px; }

.controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; padding: 12px 0; }
.btn { padding: 10px 20px; border: none; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-host { background: var(--accent); color: #fff; padding: 14px 36px; font-size: 1rem; border-radius: 8px; }
.btn-host:hover { background: #c73850; transform: translateY(-2px); }
.btn-danger { background: #c0392b; color: #fff; }
.btn-danger:hover { background: #a93226; }
.btn-secondary { background: #333; color: #fff; }
.btn-secondary:hover { background: #444; }
.btn-rec { background: #c0392b; color: #fff; }
.btn-rec.recording { background: #555; }

.room-info { background: var(--card); border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
.viewer-count { font-size: 0.9rem; color: var(--muted); }
.viewer-count span { color: #2ecc71; font-weight: 700; font-size: 1.1rem; }
.copy-link { background: var(--blue); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.82rem; }
.copy-link:hover { background: #1a4a80; }

.chat-area { background: var(--card); border-radius: 8px; padding: 16px; max-height: 180px; overflow-y: auto; margin-top: 12px; }
.chat-area .msg { padding: 4px 0; font-size: 0.82rem; border-bottom: 1px solid #222; }
.chat-area .msg .time { color: var(--muted); margin-right: 8px; font-size: 0.72rem; }
.chat-area .msg .name { color: var(--accent); font-weight: 600; margin-right: 6px; }

/* Landing */
.landing { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; gap: 30px; text-align: center; }
.landing h2 { font-size: 2rem; font-weight: 300; }
.landing p { color: var(--muted); max-width: 500px; line-height: 1.6; }

/* Viewer waiting */
.waiting { text-align: center; padding: 60px 20px; }
.waiting .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 768px) {
  .landing h2 { font-size: 1.4rem; }
  .btn-host { padding: 12px 24px; font-size: 0.9rem; }
  .container { padding: 12px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>Live<span>Share</span></h1>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">대기 중</span>
  </div>
</div>

<div class="container">
  <!-- HOST landing -->
  <div class="landing" id="hostLanding">
    <h2>실시간 화면 공유</h2>
    <p>화면과 마이크를 최대 100명에게 실시간으로 공유하세요.<br>설치 없이 브라우저만으로 작동합니다.</p>
    <button class="btn btn-host" onclick="startHost()">방송 시작</button>
  </div>

  <!-- HOST room -->
  <div class="room" id="hostRoom">
    <div class="room-info">
      <div class="viewer-count">시청자 <span id="viewerCount">0</span>명</div>
      <div style="display:flex;gap:8px;">
        <button class="copy-link" onclick="copyLink()">초대 링크 복사</button>
      </div>
    </div>
    <div class="video-area">
      <video id="hostVideo" autoplay muted playsinline></video>
      <div class="rec-badge" id="recBadge">REC</div>
    </div>
    <div class="controls">
      <button class="btn btn-secondary" id="micBtn" onclick="toggleMic()">🎤 마이크 ON</button>
      <button class="btn btn-secondary" onclick="changeScreen()">🖥️ 화면 변경</button>
      <button class="btn btn-rec" id="recBtn" onclick="toggleRecord()">⏺ 녹화 시작</button>
      <button class="btn btn-danger" onclick="stopHost()">방송 종료</button>
    </div>
    <div class="chat-area" id="hostChat"></div>
  </div>

  <!-- VIEWER room -->
  <div class="room" id="viewerRoom">
    <div class="room-info">
      <div class="viewer-count">실시간 시청 중</div>
    </div>
    <div class="video-area">
      <video id="viewerVideo" autoplay playsinline></video>
      <div class="no-stream" id="noStream">
        <div class="waiting">
          <div class="spinner"></div>
          방송자 연결 대기 중...
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="btn btn-danger" onclick="leaveRoom()">나가기</button>
    </div>
  </div>
</div>

<script>
const ROOM_ID = 'liveshare-main-room';
let peer = null;
let hostStream = null;
let micStream = null;
let mixedStream = null;
let connections = [];
let micEnabled = true;
let mediaRecorder = null;
let recordedChunks = [];
let isRecording = false;
let isHost = false;

function setStatus(text, live) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusDot').className = live ? 'dot live' : 'dot';
}

function log(name, text) {
  const chat = document.getElementById('hostChat');
  if (!chat) return;
  const now = new Date();
  const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  chat.innerHTML += `<div class="msg"><span class="time">${time}</span><span class="name">${name}</span>${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

function updateViewerCount() {
  const el = document.getElementById('viewerCount');
  if (el) el.textContent = connections.filter(c => c.open).length;
}

// ═══ HOST ═══
async function startHost() {
  try {
    hostStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch(e) { console.log('No mic'); }

    mixStreams();
    document.getElementById('hostVideo').srcObject = hostStream;

    peer = new Peer('ls-' + ROOM_ID, {
      config: { iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' },
        { urls: 'stun:stun3.l.google.com:19302' },
        { urls: 'stun:stun4.l.google.com:19302' }
      ]}
    });

    peer.on('open', () => {
      isHost = true;
      document.getElementById('hostLanding').style.display = 'none';
      document.getElementById('hostRoom').classList.add('active');
      setStatus('방송 중', true);
      log('시스템', '방송이 시작되었습니다.');
    });

    // When viewer connects via data, call them back with stream
    peer.on('connection', (conn) => {
      conn.on('open', () => {
        const stream = mixedStream || hostStream;
        const call = peer.call(conn.peer, stream);
        connections.push(call);
        updateViewerCount();
        log('시스템', '새 시청자 연결 (총 ' + connections.filter(c=>c.open).length + '명)');

        call.on('close', () => {
          connections = connections.filter(c => c !== call);
          updateViewerCount();
          log('시스템', '시청자 퇴장 (총 ' + connections.filter(c=>c.open).length + '명)');
        });
      });
    });

    peer.on('error', (err) => {
      console.error(err);
      if (err.type === 'unavailable-id') {
        alert('이미 방송 중인 세션이 있습니다.');
        location.reload();
      }
    });

    hostStream.getVideoTracks()[0].onended = () => stopHost();
  } catch(e) {
    alert('화면 공유를 허용해주세요.');
  }
}

function mixStreams() {
  const ctx = new AudioContext();
  const dest = ctx.createMediaStreamDestination();
  if (hostStream.getAudioTracks().length > 0) {
    ctx.createMediaStreamSource(new MediaStream(hostStream.getAudioTracks())).connect(dest);
  }
  if (micStream && micStream.getAudioTracks().length > 0) {
    ctx.createMediaStreamSource(micStream).connect(dest);
  }
  mixedStream = new MediaStream([
    ...hostStream.getVideoTracks(),
    ...dest.stream.getAudioTracks()
  ]);
}

function toggleMic() {
  if (!micStream) return;
  micEnabled = !micEnabled;
  micStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
  document.getElementById('micBtn').textContent = micEnabled ? '🎤 마이크 ON' : '🔇 마이크 OFF';
}

async function changeScreen() {
  try {
    const newStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
    const newTrack = newStream.getVideoTracks()[0];
    hostStream.getVideoTracks().forEach(t => t.stop());
    hostStream = newStream;
    document.getElementById('hostVideo').srcObject = hostStream;
    mixStreams();
    connections.forEach(call => {
      const sender = call.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
      if (sender) sender.replaceTrack(newTrack);
    });
    newTrack.onended = () => stopHost();
    log('시스템', '화면이 변경되었습니다.');
  } catch(e) { console.error(e); }
}

// ═══ RECORDING (host only) ═══
function toggleRecord() {
  if (!isRecording) startRecord();
  else stopRecord();
}

function startRecord() {
  const stream = mixedStream || hostStream;
  if (!stream) return;
  recordedChunks = [];
  try {
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9,opus' });
  } catch(e) {
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
  }
  mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const now = new Date();
    const fname = `recording_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.webm`;
    a.href = url; a.download = fname; a.click();
    URL.revokeObjectURL(url);
  };
  mediaRecorder.start(1000);
  isRecording = true;
  document.getElementById('recBtn').textContent = '⏹ 녹화 중지';
  document.getElementById('recBtn').classList.add('recording');
  document.getElementById('recBadge').style.display = 'block';
  log('시스템', '녹화가 시작되었습니다.');
}

function stopRecord() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  isRecording = false;
  document.getElementById('recBtn').textContent = '⏺ 녹화 시작';
  document.getElementById('recBtn').classList.remove('recording');
  document.getElementById('recBadge').style.display = 'none';
  log('시스템', '녹화가 저장되었습니다.');
}

function stopHost() {
  if (isRecording) stopRecord();
  if (hostStream) hostStream.getTracks().forEach(t => t.stop());
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  connections.forEach(c => c.close());
  if (peer) peer.destroy();
  isHost = false;
  setStatus('대기 중', false);
  document.getElementById('hostRoom').classList.remove('active');
  document.getElementById('hostLanding').style.display = '';
}

// ═══ VIEWER (auto-join) ═══
function joinAsViewer() {
  peer = new Peer(null, {
    config: { iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'stun:stun2.l.google.com:19302' },
      { urls: 'stun:stun3.l.google.com:19302' },
      { urls: 'stun:stun4.l.google.com:19302' }
    ]}
  });

  peer.on('open', () => {
    document.getElementById('hostLanding').style.display = 'none';
    document.getElementById('viewerRoom').classList.add('active');
    setStatus('연결 중...', false);

    // Use data connection first to signal, then host calls viewer back
    const conn = peer.connect('ls-' + ROOM_ID);

    conn.on('open', () => {
      setStatus('연결됨, 스트림 대기 중...', false);
    });

    conn.on('error', () => {
      document.getElementById('noStream').innerHTML = '<div style="padding:60px 20px;text-align:center;">현재 방송 중이 아닙니다.</div>';
      setStatus('방송 없음', false);
    });

    // Host will call us back with the stream
    peer.on('call', (call) => {
      call.answer();
      call.on('stream', (stream) => {
        document.getElementById('viewerVideo').srcObject = stream;
        document.getElementById('noStream').style.display = 'none';
        setStatus('시청 중', true);
      });
      call.on('close', () => {
        setStatus('방송 종료', false);
        document.getElementById('noStream').style.display = '';
        document.getElementById('noStream').innerHTML = '<div style="padding:60px 20px;text-align:center;">방송이 종료되었습니다.</div>';
      });
    });
  });

  peer.on('error', (err) => {
    console.error(err);
    if (err.type === 'peer-unavailable') {
      document.getElementById('noStream').innerHTML = '<div style="padding:60px 20px;text-align:center;">현재 방송 중이 아닙니다.</div>';
      setStatus('방송 없음', false);
    }
  });
}

function leaveRoom() {
  if (peer) peer.destroy();
  setStatus('대기 중', false);
  document.getElementById('viewerRoom').classList.remove('active');
  document.getElementById('hostLanding').style.display = '';
}

function copyLink() {
  const url = window.location.origin + window.location.pathname + '?watch=1';
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.querySelector('.copy-link');
    btn.textContent = '복사됨!';
    setTimeout(() => btn.textContent = '초대 링크 복사', 2000);
  });
}

// ═══ AUTO ROUTE ═══
window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  if (params.has('watch')) {
    joinAsViewer();
  }
});
</script>
</body>
</html>
